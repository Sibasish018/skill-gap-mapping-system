{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>SkillGap</h1>
    </div>

    <h3>Welcome back</h3>
    <p class="auth-sub">Sign in to continue your learning journey</p>

    <form method="POST" action="/login">

      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" name="username" placeholder="Enter your username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <button class="btn btn-primary btn-w100" type="submit">Sign In</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="/signup">Create one</a>
    </p>

  </div>
</div>
{% endblock %}
