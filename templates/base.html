<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Gap Mapping System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Animated background blobs (always visible) -->
<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

{% if session.get("user") %}
<div class="app-layout">
  <aside class="sidebar">

    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div>
        <h1>SkillGap</h1>
        <span>Mapping System</span>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar">{{ session["user"][0]|upper }}</div>
      <div class="user-info">
        <strong>{{ session["user"] }}</strong>
        <small>Student</small>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="/analysis" class="{{ 'active' if request.path == '/analysis' or 'analyz' in request.path else '' }}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <span>Skill Analysis</span>
      </a>
      <a href="/progress" class="{{ 'active' if request.path == '/progress' else '' }}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/>
        </svg>
        <span>My Progress</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="/logout">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Logout</span>
      </a>
    </div>

  </aside>
  <main class="main-content">
{% endif %}

{% block content %}{% endblock %}

{% if session.get("user") %}
  </main>
</div>
{% endif %}

</body>
</html>
